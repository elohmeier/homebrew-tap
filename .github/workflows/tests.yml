name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:
  workflow_run:
    workflows: ["Update Checksums"]
    types: [completed]

jobs:
  test-bot:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
    steps:
      - name: Get PR info
        if: github.event_name == 'workflow_run'
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --json number --jq '.[0].number')
          PR_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json headRefOid --jq .headRefOid)
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Checkout PR branch and detect changed formulae
        if: github.event_name == 'workflow_run'
        id: pr-checkout
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        run: |
          git fetch origin main "${{ github.event.workflow_run.head_branch }}"
          git checkout FETCH_HEAD
          CHANGED=$(git diff --name-only origin/main...HEAD -- Formula/ \
            | sed -n 's|^Formula/\(.*\)\.rb$|elohmeier/tap/\1|p' \
            | paste -sd ',' -)
          echo "testing_formulae=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - run: brew test-bot --only-formulae --testing-formulae="${{ steps.pr-checkout.outputs.testing_formulae }}"
        if: github.event_name == 'workflow_run' && steps.pr-checkout.outputs.testing_formulae

      - name: Upload bottles as artifact
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_run')
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'

      - name: Report check on PR HEAD
        if: always() && github.event_name == 'workflow_run' && steps.pr-info.outputs.pr_sha
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/check-runs" \
            -d '{
              "name": "test-bot (${{ matrix.os }})",
              "head_sha": "${{ steps.pr-info.outputs.pr_sha }}",
              "status": "completed",
              "conclusion": "${{ job.status }}",
              "output": {
                "title": "brew test-bot (${{ matrix.os }})",
                "summary": "Re-run after checksum update"
              }
            }'
